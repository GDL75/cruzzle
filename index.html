<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUZZLE a déménagé</title>
  <meta http-equiv="refresh" content="0; url=https://cruzzle.vercel.app">
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #faf6f0;
      color: #26120d;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      max-width: 380px;
    }
    h1 {
      font-family: "Bookman Old Style", "Rockwell", Georgia, serif;
      font-style: italic;
      color: #e8290b;
      font-size: 2rem;
      margin: 0 0 12px;
    }
    p { line-height: 1.5; margin: 0 0 22px; }
    a {
      display: inline-block;
      background: linear-gradient(160deg, #e8290b, #b71c0c);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>CRUZZLE</h1>
    <p>Cette adresse a déménagé. Vous allez être redirigé automatiquement — si ce n'est pas le cas, cliquez ci-dessous.</p>
    <a id="link" href="https://cruzzle.vercel.app">Ouvrir Cruzzle</a>
  </div>
  <script>
    // Si un ancien Cruzzle (PWA hors ligne) était installé depuis cette
    // adresse, on désinscrit son service worker et on vide son cache avant
    // de rediriger, sinon la version hors ligne resterait servie en boucle.
    (async () => {
      const dest = document.getElementById('link').href;
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if (window.caches) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
      } catch (e) { /* tant pis, la redirection a lieu quand même */ }
      location.replace(dest);
    })();
  </script>
</body>
</html>
